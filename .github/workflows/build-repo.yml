name: Build and Deploy Custom Repo

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'pluginmaster.json'
      - 'Release/**'
      - '.github/workflows/**'
      - 'site/**'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Restore dependencies
        run: dotnet restore plogon/ffxiv-msq-thai/ffxiv-msq-thai.sln

      - name: Build Plugin
        run: dotnet build -c Release plogon/ffxiv-msq-thai/ffxiv-msq-thai.sln

      - name: Package Plugin Zip and Generate pluginmaster.json
        run: |
          python3 -c "
          import zipfile, os, json
          # 1. Package zip file
          files_to_zip = ['ffxiv-msq-thai.dll', 'ffxiv-msq-thai.json', 'THSarabunNew-Bold.ttf', 'thai_dict.txt']
          os.makedirs('../../../../../Release', exist_ok=True)
          with zipfile.ZipFile('../../../../../Release/latest.zip', 'w', zipfile.ZIP_DEFLATED) as zipf:
              for file in files_to_zip:
                  if os.path.exists(file):
                      zipf.write(file, file)
              for root, dirs, files in os.walk('content_community'):
                  for file in files:
                      filepath = os.path.join(root, file)
                      zipf.write(filepath, filepath)
          
          # 2. Update pluginmaster.json at root
          with open('ffxiv-msq-thai.json', 'r', encoding='utf-8') as f:
              manifest = json.load(f)
          zip_url = 'https://raw.githubusercontent.com/monkeymc/ffxiv-msq-thai/main/Release/latest.zip'
          manifest['DownloadLinkInstall'] = zip_url
          manifest['DownloadLinkUpdate'] = zip_url
          manifest['DownloadLinkTesting'] = zip_url
          with open('../../../../../pluginmaster.json', 'w', encoding='utf-8') as f:
              json.dump([manifest], f, indent=2, ensure_ascii=False)
          "
        working-directory: plogon/ffxiv-msq-thai/ffxiv-msq-thai/bin/Release

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json Release/latest.zip
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update pluginmaster.json and release zip [skip ci]" && git push)
